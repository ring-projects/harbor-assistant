name: GitHub Release

on:
  push:
    tags:
      - "v*"

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Create release from tag
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
